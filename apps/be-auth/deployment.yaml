apiVersion: apps/v1
kind: Deployment
metadata:
  name: be-auth
  namespace: app
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: be-auth
  template:
    metadata:
      labels:
        app.kubernetes.io/name: be-auth
      annotations:
        instrumentation.opentelemetry.io/inject-java: "java-instrumentation"
    spec:
      imagePullSecrets:
        - name: harbor-credentials
      containers:
        - name: be-auth
          image: harbor.platform.local/app/be-auth:latest
          ports:
            - containerPort: 8080
          env:
            - name: OTEL_SERVICE_NAME
              value: be-auth
 #             valueFrom:
 #               fieldRef:
 #                 fieldPath: metadata.labels['app.kubernetes.io/name']
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "10m"
            limits:
              memory: "512Mi"
              cpu: "500m"
