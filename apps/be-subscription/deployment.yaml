apiVersion: apps/v1
kind: Deployment
metadata:
  name: be-subscription
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: be-subscription
  template:
    metadata:
      labels:
        app: be-subscription
    spec:
      imagePullSecrets:
        - name: harbor-credentials
      containers:
        - name: be-subscription
          image: harbor.platform.local/app/be-subscription:latest
          ports:
            - containerPort: 8080
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: JAVA_TOOL_OPTIONS
              value: >-
                -javaagent:/app/opentelemetry-javaagent.jar
                -Dotel.service.name=be-subscription
                -Dotel.metrics.exporter=otlp
                -Dotel.logs.exporter=otlp
                -Dotel.traces.exporter=otlp
                -Dotel.exporter.otlp.endpoint=http://$(NODE_IP):4317
                -Dotel.exporter.otlp.protocol=grpc
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"