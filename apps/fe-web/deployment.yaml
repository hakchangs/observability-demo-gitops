apiVersion: apps/v1
kind: Deployment
metadata:
  name: fe-web
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fe-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fe-web
      annotations:
        instrumentation.opentelemetry.io/inject-nodejs: "pltform-observability/java-instrumentation"
    spec:
      imagePullSecrets:
        - name: harbor-credentials
      containers:
        - name: fe-web
          image: harbor.platform.local/app/fe-web:52306532
          ports:
            - containerPort: 80
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: BFF_URL
              value: http://be-bff:8080
            - name: OTEL_COLLECTOR_URL
              value: http://$(NODE_IP):4318
            - name: OTEL_LOGS_EXPORTER
              value: otlp
            - name: OTEL_COLLECTOR_HTTP_URL
              value: http://$(NODE_IP):4318
            - name: NEXT_PUBLIC_SERVICE_NAME
              value: fe-web
            - name: HOSTNAME
              value: "0.0.0.0"
