apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-demo
  namespace: platform-cd
spec:
  project: default
  source:
    repoURL: https://gitlab.platform.local/root/observability-demo-gitops.git
    targetRevision: main
    path: apps
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false